name : Postman Collection Workflow

on :
  push :
    branches: [main]
  workflow_dispatch: 
  schedule:
    #- cron : 30 02 * * * # 8 am ist
    - cron : 00 11 * * *  # 7:30 PM IST
    

jobs:
  run-postman-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v6.0.2

      - name: Installed Node js and npm
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'

      - name: Install Newman and htmlextra
        run: | 
             npm install -g newman
             npm install -g newman-reporter-htmlextra
              

      - name: Run the postman collection with Postman
        run: |
          newman run 'Inwarranty-flow Collection.postman_collection.json' \
          -e QA.postman_environment.json \
          -d testData.csv \
          -r cli,htmlextra

      - name: newman report
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
           name: Newman Report
           path: newman/*.html

      - name: Creating github page branch
        if: always()
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: newman/

      - name: send Email Notifications
        if: always()
        uses: dawidd6/action-send-mail@v15
        with:
           server_address: smtp.gmail.com
           server_port: 465
           username: ${{ secrets.EMAIL_USERNAME }}
           password: ${{ secrets.EMAIL_PASSWORD }}
           subject: Phoenix Inwarranty Test Execution notification
           to: sosameetskuya@gmail.com
           from: ${{ secrets.EMAIL_USERNAME }}
           body: |
                 Hi ,
                 Phoenix Inwarranty Flow Tests has been executed.The report has been published and the URL
                 is: https://iamsourabh434.github.io/Phoenix-Inwarranty-Flow/

        
       
